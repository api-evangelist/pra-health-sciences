name: PRA Health Sciences
description: |
  PRA Health Sciences was a global contract research organization (CRO) headquartered
  in Raleigh, North Carolina, providing outsourced clinical development services to
  pharmaceutical and biotechnology companies. On July 1, 2021 ICON plc completed its
  acquisition of PRA Health Sciences in a cash-and-stock transaction valued at
  approximately $12 billion, forming one of the world's largest healthcare research
  organizations. Following the acquisition the PRA Health Sciences brand has been
  fully retired and operations were merged into ICON. The legacy prahs.com domain
  redirects to iconplc.com / icongroup.com and no PRA-branded developer programs,
  public APIs, SDKs, or technical documentation remain.
